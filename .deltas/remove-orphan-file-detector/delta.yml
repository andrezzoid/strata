goal: >
  Remove the orphanFile detector from Strata's public detector catalog and scanning output.

context: |
  The detector is exposed through DETECTOR_DEFINITIONS, CLI selection, README detector docs, SARIF rule metadata, and tests.
  Historical changelog/delta mentions can remain as record, but current release surface should stop advertising orphanFile.
  Baseline verified before planning: `bun test` passed with 110 tests.

refs:
  - src/detectors/registry.ts
  - src/detectors/orphan-file.ts
  - src/sarif.ts
  - test/detectors.test.ts
  - test/core.test.ts
  - test/cli.test.ts
  - README.md
  - docs/detectors/orphan-file.md

acceptance:
  - The default scanner no longer runs or emits orphanFile findings.
  - Detector selection surfaces no longer accept or list orphanFile as an available detector.
  - Current README/docs/release notes no longer advertise orphanFile as a supported detector.
  - Relevant tests and typecheck pass after removal.

tasks:
  - id: remove-orphan-file-surface
    description: >
      Remove orphanFile from detector registration, public metadata, tests, fixtures, and current documentation so the project no longer exposes it as a supported detector.
    status: done
    context: |
      Keep historical changelog and old delta references unless they describe current behavior.
      Preserve cross-file detector behavior for duplicateSymbol and uniqueImplementation.
      Update tests before implementation where assertions currently require orphanFile.
    acceptance:
      - DETECTOR_DEFINITIONS and derived detector IDs do not include orphanFile.
      - Tests no longer import or select detectOrphanFile and default scans assert only remaining detector behavior.
      - README, detector docs, and SARIF rule metadata no longer list orphanFile as supported.
      - "`bun test` and `bun run typecheck` pass."
    depends_on: []

notes:
  - >
    Full `bun run format:check` still fails on pre-existing untracked `docs/research/red-flags-source.md`; touched files pass direct oxfmt checks.

