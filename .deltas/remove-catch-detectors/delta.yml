goal: >
  Remove the `emptyCatch` and `catchRethrow` detectors from the scanner's
  supported detector set.

acceptance:
  - Scanner output no longer emits or documents `emptyCatch` findings.
  - Scanner output no longer emits or documents `catchRethrow` findings.
  - CLI detector filters reject both removed detector IDs as unknown names.

context: |
  `DETECTOR_DEFINITIONS` is the scanner's source of truth for supported detector IDs.
  Removing detector support also means removing docs, SARIF rule descriptors,
  fixtures, and tests that advertise or directly exercise the deleted detectors.

refs:
  - src/detectors/registry.ts
  - src/sarif.ts
  - test/detectors.test.ts
  - test/cli.test.ts
  - test/action.test.ts
  - README.md

tasks:
  - id: remove-catch-detectors
    description: >
      Remove `emptyCatch` and `catchRethrow` from the supported detector surface
      and delete their now-unused implementation, docs, fixtures, and tests.
    status: done
    context: |
      Follow the earlier removed-detector pattern in `test/cli.test.ts`.
      Keep `scanProject()` and CLI filtering driven by the registry instead of
      adding compatibility paths for removed detector names.
    acceptance:
      - "`emptyCatch` and `catchRethrow` are absent from the detector registry and SARIF rules."
      - Removed detector names are rejected by CLI filtering rather than silently accepted.
      - Documentation and test fixtures no longer advertise or exercise the removed detectors.
      - Relevant tests pass after the removal.
    depends_on: []

notes:
  - >
    Full `bun run format:check` still fails on pre-existing formatting in
    `docs/research/red-flags-source.md`; touched files pass `bunx oxfmt --check`.

