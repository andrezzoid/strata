    summary: >
      Planned one vertical detector slice: tests, implementation, fixture/docs,
      and focused verification stay together because each acceptance criterion is
      about the integrated detector contract. Baseline evidence before planning:
      `bun test test/detectors.test.ts` passed with 14 tests. Considered two
      designs: (A) local AST eligibility around exported declarations/classes;
      (B) a two-pass exported-symbol index. Chose A because it preserves the
      single-detector interface and hides less fake machinery while still
