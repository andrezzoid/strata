goal: >
  Tighten the wideSignature detector so it reports only public/exported API
  boundaries, aligning the signal with research on verbose interfaces.

context: |
  wideSignature should identify caller-facing overexposure, not private helper
  implementation details. Preserve existing threshold semantics; narrow only the
  declarations considered eligible.
  Design choice: prefer local syntactic export eligibility over a cross-file
  symbol model. The detector is single-file and only needs boundary visibility,
  so project-level export resolution would add interface surface without
  improving the signal.

refs:
  - src/detectors/wide-signature.ts
  - test/detectors.test.ts
  - docs/detectors/wide-signature.md

acceptance:
  - Non-exported/private functions and methods with wide signatures are not reported.
  - Exported declarations and public class methods with wide signatures are still reported.
  - Detector tests, typecheck, and lint pass.

tasks:
  - id: restrict-wide-signature-scope
    description: >
      Update wideSignature to count only exported top-level functions and public
      members of exported classes, then update regression coverage and detector
      documentation for the narrowed signal.
    status: done
    context: |
      Keep the >4 required parameter threshold unchanged. Treat constructors as
      public class surface when the class is exported; exclude private/protected
      methods and non-exported helper declarations.
    acceptance:
      - Private/non-exported wide functions and methods are covered by failing-first tests and no longer emit findings.
      - Exported functions, exported-class constructors, and public exported-class methods with >4 required params still emit findings.
      - "`bun test test/detectors.test.ts` passes after the implementation."
    depends_on: []

log:
