goal: >
  Remove the `shallowModule` detector from strata's public detector set.

acceptance:
  - "`shallowModule` is no longer registered, runnable through `--only`, emitted in SARIF rules, or listed in public detector docs."
  - Source, test, fixture, and detector-doc files dedicated only to `shallowModule` are removed.
  - Remaining detector behavior and CLI selection continue to pass the relevant tests and typecheck.

context: |
  This is a removal, not a threshold or semantics change. Do not preserve the detector behind a compatibility alias without a concrete external contract.
  The detector registry is the public catalog for CLI/API filtering; removing the registry entry intentionally makes `--only shallowModule` invalid.
  Shared module-surface counting may be removed only if no remaining detector imports it.

refs:
  - src/detectors/registry.ts
  - src/detectors/shallow-module.ts
  - src/detectors/module-surface.ts
  - src/format.ts
  - src/sarif.ts
  - test/detectors.test.ts
  - test/fixtures/shallow-module/
  - test/cli.test.ts
  - README.md
  - CHANGELOG.md
  - docs/detectors/shallow-module.md

open_questions: []

tasks:
  - id: remove-shallow-module-detector
    description: >
      Remove the `shallowModule` detector end-to-end from code, tests, fixtures,
      SARIF/text metadata, and public detector documentation.
    status: done
    context: |
      Follow the public-removal shape used by the wide-module detector removal.
      Remove shared module-surface counting if this detector is its last consumer.
      Add CLI coverage proving the former detector filter is rejected by the registry-backed valid-detector list.
    acceptance:
      - The registry no longer imports or defines `detectShallowModule` or `shallowModule`.
      - "`--only shallowModule` is rejected as an unknown detector."
      - Dedicated detector tests, fixture expectations, SARIF rule, text evidence branch, README row, detector doc, and related links are removed or updated.
      - "`bun test test/detectors.test.ts test/fixtures.test.ts test/cli.test.ts` and `bun run typecheck` pass."
    depends_on: []

