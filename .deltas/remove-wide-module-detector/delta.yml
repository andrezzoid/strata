goal: >
  Remove the `wideModule` detector from strata's public detector set.

acceptance:
  - "`wideModule` is no longer registered, runnable through `--only`, emitted in SARIF rules, or listed in public detector docs."
  - Source, test, fixture, and detector-doc files dedicated only to `wideModule` are removed.
  - Remaining detector behavior and CLI selection continue to pass the relevant tests and typecheck.

context: |
  This is a removal, not a threshold or semantics change. Do not preserve the detector behind a compatibility alias without a concrete external contract.
  The detector registry is the public catalog for CLI/API filtering; removing the registry entry intentionally makes `--only wideModule` invalid.
  `shallowModule` still owns exported surface ratio analysis and continues to use shared module-surface counting.

refs:
  - src/detectors/registry.ts
  - src/detectors/wide-module.ts
  - src/detectors/module-surface.ts
  - src/format.ts
  - src/sarif.ts
  - test/detectors.test.ts
  - test/fixtures/wide-module/
  - test/cli.test.ts
  - README.md
  - CHANGELOG.md
  - docs/detectors/wide-module.md
  - docs/detectors/shallow-module.md

open_questions: []

tasks:
  - id: remove-wide-module-detector
    description: >
      Remove the `wideModule` detector end-to-end from code, tests, fixtures,
      SARIF/text metadata, and public detector documentation.
    status: done
    context: |
      Follow the same public-removal shape as the prior pass-through-variable, ts-escape-hatch, and catch-handling removals.
      Keep `countModuleSurface()` if `shallowModule` still uses it; remove only wide-module-specific source and metadata.
      Add CLI coverage proving the former detector filter is rejected by the registry-backed valid-detector list.
    acceptance:
      - The registry no longer imports or defines `detectWideModule` or `wideModule`.
      - "`--only wideModule` is rejected as an unknown detector."
      - Dedicated detector tests, fixture expectations, SARIF rule, text evidence branch, README row, detector doc, and related links are removed or updated.
      - "`bun test test/detectors.test.ts test/fixtures.test.ts test/cli.test.ts` and `bun run typecheck` pass."
    depends_on: []

