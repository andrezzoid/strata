goal: >
  Remove the `tsEscapeHatch` detector from strata's public detector set.

acceptance:
  - "`tsEscapeHatch` is no longer registered, runnable through `--only`, emitted in SARIF rules, or listed in public detector docs."
  - Source, test, fixture, and detector-doc files dedicated only to `tsEscapeHatch` are removed.
  - Remaining detector behavior and CLI selection continue to pass the relevant tests and typecheck.

context: |
  This is a removal, not a semantic refinement. Do not preserve the detector behind a compatibility alias without a concrete external contract.
  The detector registry is the public catalog for CLI/API filtering; removing the registry entry intentionally makes `--only tsEscapeHatch` invalid.
  Formatter and SARIF special cases should only describe detectors that can still be emitted.

refs:
  - src/detectors/registry.ts
  - src/sarif.ts
  - src/format.ts
  - src/ast.ts
  - test/detectors.test.ts
  - README.md
  - docs/detectors/ts-escape-hatch.md

open_questions: []

tasks:
  - id: remove-ts-escape-hatch-detector
    description: >
      Remove the detector implementation, public registry entry, detector-specific
      formatting/SARIF/docs references, and tests/fixtures that only validate
      `tsEscapeHatch` behavior.
    status: done
    context: |
      Follow the same public-removal shape as the existing pass-through-variable removal delta.
      Keep parser comments on `Ctx` unless no remaining detector or caller needs them; this task should not broaden into parser API redesign.
    acceptance:
      - No production imports or registry definitions reference `detectTsEscapeHatches` or `tsEscapeHatch`.
      - Dedicated `ts-escape-hatches` source, fixture, detector doc, and unit tests are gone.
      - README detector list and SARIF rule catalog no longer advertise `tsEscapeHatch`.
      - Relevant tests, typecheck, and self-scan pass.
    depends_on: []

