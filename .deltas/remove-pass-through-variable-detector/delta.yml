goal: >
  Remove the `passThroughVariable` detector from strata's public detector set.

acceptance:
  - "`passThroughVariable` is no longer registered, runnable through `--only`, emitted in SARIF rules, or listed in public detector docs."
  - Source, test, fixture, and detector-doc files dedicated only to `passThroughVariable` are removed.
  - Remaining detector behavior and CLI selection continue to pass the relevant tests and typecheck.

context: |
  This is a removal, not a semantic refinement. Do not preserve the detector behind a compatibility alias unless a concrete external contract requires it.
  The registry is the public detector catalog for CLI/API filtering; removing the registry entry makes `--only passThroughVariable` invalid by design.
  Formatter and SARIF special cases should only describe detectors that can still be emitted.

refs:
  - src/detectors/registry.ts
  - src/detectors/pass-through-variable.ts
  - src/format.ts
  - src/sarif.ts
  - test/detectors.test.ts
  - test/fixtures/pass-through-variable/
  - README.md
  - docs/detectors/pass-through-variable.md
  - docs/detectors/pass-through-method.md

open_questions: []

tasks:
  - id: remove-pass-through-variable-detector
    description: >
      Remove the `passThroughVariable` detector end-to-end from code, tests,
      fixtures, SARIF/text metadata, and public detector documentation.
    status: done
    context: |
      Keep the existing detector registry as the single source of enabled detector IDs.
      Delete dedicated detector artifacts rather than leaving dead code or stale docs.
      Update adjacent docs that link to the removed detector, but do not broaden `passThroughMethod` to absorb parameter-threading behavior.
    acceptance:
      - The registry no longer imports or defines `passThroughVariable`.
      - "`--only passThroughVariable` is rejected as an unknown detector."
      - Dedicated detector tests, fixture expectations, SARIF rule, text evidence branch, README row, detector doc, and related links are removed or updated.
      - "`bun test test/detectors.test.ts test/fixtures.test.ts test/cli.test.ts` and `bun run typecheck` pass."
    depends_on: []

