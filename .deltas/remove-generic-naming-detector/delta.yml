goal: >
  Remove the `genericNaming` detector from strata's public detector set.

acceptance:
  - "`genericNaming` is no longer registered, runnable through `--only`, emitted in SARIF rules, or listed in public detector docs."
  - Source, test, and detector-doc files dedicated only to `genericNaming` are removed.
  - Remaining detector behavior, CLI selection, action output, and typecheck continue to pass.

context: |
  This is a detector removal, not a refinement of the vague-name heuristic.
  `DETECTOR_DEFINITIONS` remains the public catalog for supported detector IDs; removing the registry entry intentionally makes `--only genericNaming` invalid.
  Formatter and SARIF metadata should only describe detectors that can still be emitted.

refs:
  - src/detectors/registry.ts
  - src/format.ts
  - src/sarif.ts
  - test/detectors.test.ts
  - test/fixtures/generic-naming/
  - test/cli.test.ts
  - test/action.test.ts
  - README.md
  - CHANGELOG.md
  - docs/detectors/generic-naming.md

open_questions: []

tasks:
  - id: remove-generic-naming-detector
    description: >
      Remove the `genericNaming` detector end-to-end from code, tests, SARIF/text
      metadata, action fixture selection, and public detector documentation.
    status: done
    context: |
      Follow the existing removed-detector pattern: delete dedicated artifacts instead of leaving dead code or compatibility aliases.
      Update the action zero-candidate test to use a remaining detector so it still covers successful empty reports.
      Add CLI coverage proving `--only genericNaming` is now rejected by registry-driven selection.
    acceptance:
      - The registry no longer imports or defines `genericNaming`.
      - "`--only genericNaming` is rejected as an unknown detector."
      - Dedicated detector implementation, unit tests, fixture, text evidence branch, SARIF rule, README row/example, detector doc, and changelog surface are removed or updated.
      - Focused tests and typecheck pass after the removal.
    depends_on: []

