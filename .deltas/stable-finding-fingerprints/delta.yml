goal: >
  Add stable finding fingerprints to JSON and SARIF output so CI systems,
  agents, and future baselines can recognize the same candidate across harmless
  line shifts without weakening strata's candidate-not-verdict contract.

acceptance:
  - JSON output includes a deterministic fingerprint for each finding.
  - SARIF output exposes the same finding identity through GitHub-compatible partial fingerprints.
  - Fingerprints remain stable across harmless line shifts when detector-owned semantic anchors are available.
  - Distinct findings from the same detector in the same file do not collapse to the same fingerprint.
  - Existing detector semantics, finding order, JSON fields, text output, `--diff`, and `--fail-on-findings` behavior remain compatible.
  - README, CHANGELOG, or BACKLOG are updated if the user-visible output contract changes.

context: |
  `Finding` is the public JSON shape; JSON output is a direct `JSON.stringify(result)`, while text output ignores unknown fields.
  SARIF already emits `partialFingerprints.primaryLocationLineHash`, but the value is `flag:file:line:message`, so harmless line shifts change alert identity.
  GitHub's SARIF docs say uploaded third-party results should populate `partialFingerprints`; GitHub code scanning only uses `primaryLocationLineHash`.
  Recommended design: detectors construct findings through a small helper that sets fixed `candidate` severity and hashes detector-owned identity parts into a versioned `strata:v1:<hash>` fingerprint.
  Formatters should consume `finding.fingerprint`; SARIF should put that same value in `primaryLocationLineHash` even though the SARIF property name says line hash.
  Adding `fingerprint` to JSON is an intentional additive output-contract change; text output, detector order, detector semantics, `--diff`, and `--fail-on-findings` should stay unchanged.

