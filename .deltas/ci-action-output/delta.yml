tasks:
  - id: reuse-text-report-in-action-console
    description: >
      Make successful GitHub Action runs print the existing CLI text report to
      the live console, then add only action-owned status for GitHub summary
      writing. Keep JSON as the internal CLI invocation used for annotations and
      summary data.
    status: done
    context: |
      Do not add a compact formatter or `--format github`.
      The action can parse JSON, qualify paths for annotations/summary, and still render the console report from the unqualified scan result so it matches `strata <path> --format text`.
      Text context should use the normalized comparison ref (`origin/<base>` when the action fetched a branch), matching the CLI command the action actually ran.
    acceptance:
      - Action tests fail first proving a summary-file run prints `strata complexity candidates`, `Mode: full scan`, `Target: ...`, and `Found ... review candidates` to stdout.
      - Action tests fail first proving a zero-candidate summary-file run prints the CLI zero-candidate text instead of no stdout.
      - Action output records whether the GitHub job summary was written, without changing the CLI text report itself.
      - Warning annotations and job summary writing still happen before `fail-on-findings` exits non-zero.
      - `bun test test/action.test.ts` passes.
    depends_on: []

  - id: reuse-scan-failure-report-in-action
    description: >
      Route scanner/CLI failures in the GitHub Action through the same
      `strata scan failed` report shape instead of wrapping them in a generic
      action failure message with command boilerplate.
    status: done
    context: |
      Candidate gating is not a tool failure: when findings exist and `fail-on-findings` is true, the action should still emit the normal report, annotations, and summary before returning 1.
      Preserve action-specific workflow errors only for failures outside the scanner/CLI failure contract.
      If the action invokes the CLI as JSON and stderr starts with the scan failure report, forward that report directly.
    acceptance:
      - Action tests fail first for an invalid base ref, expecting stderr or workflow error data to contain `strata scan failed` without `bun ... failed` command boilerplate.
      - Action tests cover a detector/internal scan failure in the action path, proving it exits non-zero with `strata scan failed` and no candidate report/annotations.
      - `fail-on-findings` with candidates remains distinguishable from a scanner/tool failure: normal candidate output is printed and the exit code is 1 only after feedback is emitted.
      - Existing CLI failure tests still pass, proving the CLI contract did not change.
      - `bun test test/action.test.ts test/cli.test.ts` passes.
    depends_on:
      - reuse-text-report-in-action-console

  - id: document-action-console-output
    description: >
      Update release-facing docs and backlog so the GitHub Action console
      contract reflects the implemented text-report reuse and scan-failure
      wording.
    status: done
    context: |
      README already documents action annotations/summary and CLI operational failures; update only the action-facing console behavior.
      BACKLOG should remove or narrow the completed console-visibility and CI-visible failure items.
      CHANGELOG should record the user-visible action output improvement.
    acceptance:
      - README says action logs include the same text report shape as `strata --format text`, plus summary-write status.
      - README or action docs state scanner/tool failures use `strata scan failed` rather than zero-candidate wording.
      - BACKLOG removes or narrows the completed GitHub Action console visibility and CI-visible scanner failure items.
      - CHANGELOG records the action console/failure output improvement.
      - `bun run format:check` passes.
    depends_on:
      - reuse-scan-failure-report-in-action

notes:
  - >
    Evidence from running the action with `GITHUB_STEP_SUMMARY` set: a fixture
    with four candidates printed four `::warning` annotation commands and no
    count/mode/summary-status line; a zero-candidate filtered run printed no
    console output at all.
  - >
    Evidence from running the action with an invalid local base ref: the step
    emitted `::error title=strata action failed::bun ... failed` and embedded
    the CLI `strata scan failed` report. The failure is non-zero, but the title
    and command wrapper make the scanner failure less direct than the CLI
    contract.
  - >
    The GitHub job summary currently reports total candidates, detector counts,
    top files, and candidate-not-verdict framing, but lacks scan mode/ref context
    and uses zero-candidate wording (`Found 0 review candidates`) that is weaker
    than the CLI's explicit non-verdict zero-candidate text.
  - >
    Design A chosen after human steering: print the full CLI text report from the
    action after parsing JSON, then add only small action-owned status lines for
    GitHub side effects. It maximizes reuse, fixes silence, and preserves one
    candidate-output dialect across local and CI logs.
  - >
    Design B rejected after human steering: add a shared compact text-report path
    in `src/format.ts`. It would reduce console length, but introduces a second
    text shape for the same scan result and makes users learn two reports.
  - >
    Design C rejected: introduce a GitHub/action CLI format. It would centralize
    output in the CLI, but it widens the public format surface for one integration
    and repeats the earlier rejected `--format github` direction from the action
    adoption delta.
  - >
    Implementation should preserve the important existing boundary: the action
    invokes the CLI as JSON so scanner behavior stays centralized; it should not
    call `scanProject()` directly unless a later concrete need justifies
    duplicating CLI option semantics.
  - >
    Failure implementation should distinguish candidate-gate exits from tool
    failures: `fail-on-findings` exits after annotations/summary for candidates;
    scan failures reuse `formatScanFailure()` wording directly, while action
    infrastructure failures should use GitHub workflow error wording only when
    they are not scanner/CLI failures, such as the runner being unable to write
    `GITHUB_STEP_SUMMARY` after a completed scan. Do not invent a second scanner
    failure dialect for the action.
  - >
    Baseline verification during explore: `bun test test/action.test.ts` passed
    8 tests / 24 expectations; `bun test test/core.test.ts test/cli.test.ts`
    passed 67 tests / 255 expectations.

