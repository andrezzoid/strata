goal: >
  Improve CI-facing output so GitHub Action logs summarize scan visibility and
  scanner/tool failures cannot be mistaken for zero review candidates.

acceptance:
  - GitHub Action console output prints the same scan report shape as `strata --format text`, including scan mode, target/ref context, candidate count, and the normal finding list when candidates exist.
  - Action console output adds only action-owned side-effect status, such as whether a GitHub job summary was written.
  - Zero-candidate action runs still print a short visible console result instead of going silent when the job summary file is used.
  - CI-facing scanner/tool failures reuse the `strata scan failed` report shape and are exited distinctly from candidate findings and zero-candidate scans.
  - Failure behavior is covered for scanner-level failures and detector/internal failures in the action path.

context: |
  This delta is separate from cli-failure-output: that completed the CLI failure contract, while this work focuses on GitHub Action and CI log behavior.
  The current backlog calls out console visibility and CI-visible scanner failure reporting as the next GitHub/output work after text output.
  Current action runs the CLI as JSON, then writes annotations and a Markdown job summary; with `GITHUB_STEP_SUMMARY` set, zero-candidate runs print nothing and candidate runs print only warning commands.
  Current scan failures exit non-zero, but the action wraps them as `strata action failed` with command boilerplate around the CLI's `strata scan failed` report.
  Revised design after Andre's steering: action console output should reuse the existing `--format text` report for successful scans and the existing `strata scan failed` report for scan failures, not introduce a compact report mode.
  The action may add small action-owned status lines for GitHub side effects, such as whether the summary was written, but candidate and failure report text should come from the CLI formatter contract.
  Rejected design: add `--format github` or action-specific CLI output; it leaks GitHub integration into the core CLI and creates another dialect.
  Rejected design: have the action hand-format compact console prose from JSON only; it is simple now but duplicates candidate framing, mode labels, and message normalization.

