goal: >
  Replace the changed-file filtering CLI flag `--diff <git-ref>` with
  `--touched-since <git-ref>` so the scan scope vocabulary matches the review
  question it answers. No CLI alias or compatibility path is needed before the
  tool has real users.

acceptance:
  - CLI accepts `--touched-since <git-ref>` for changed-file filtering.
  - CLI no longer documents or accepts `--diff <git-ref>` as a user-facing flag.
  - `--touched-since` preserves the current changed-file filtering behavior: full analysis still runs first, then findings are filtered to touched files.
  - Scope modes are presented as mutually exclusive in docs and usage: touched files, new candidate identities, worsened existing candidates, or their future union.
  - `--touched-since` remains mutually exclusive with `--new-since`.
  - README, CHANGELOG, and BACKLOG reflect the renamed scope mode and remove the completed backlog item.
  - AGENTS.md uses `--touched-since` when describing post-analysis touched-file filtering.
  - Relevant CLI/core tests and the local verification gate pass.

context: |
  BACKLOG requests replacing `--diff <git-ref>` with `--touched-since <git-ref>` now, with no alias or compatibility path.
  Existing `--diff` behavior is changed-file filtering, not hunk filtering: cross-file detectors analyze the full selected target before findings are filtered to files touched since a git ref.
  `--new-since` already exists and answers a different question: candidate identities introduced since a ref. This delta should clarify scope vocabulary without changing detector semantics.
  Design A considered: change only the CLI flag and keep internal `diffRef` names. It is the smallest code diff but preserves misleading vocabulary in the public scan API and comments.
  Design B chosen: rename the current changed-file filtering option through the scan boundary to `touchedSinceRef`, while leaving lower-level git implementation names only where they describe raw git output. This keeps `scanProject()` as the deep API and avoids a CLI compatibility alias.
  Design C rejected: introduce a generic scan-scope object now. It might fit future `--worsened-since`/`--regressed-since`, but it adds a wider abstraction before those modes exist.

refs:
  - BACKLOG.md
  - README.md
  - CHANGELOG.md
  - src/cli.ts
  - src/scan.ts
  - src/project.ts
  - test/cli.test.ts
  - test/core.test.ts
  - AGENTS.md
  - .deltas/introduced-only-filtering/delta.yml

open_questions: []

followups:
  - `--worsened-since` and `--regressed-since` remain separate backlog items; this delta should only rename the existing touched-file scope.

tasks:
  - id: rename-touched-scope
    description: >
      Replace the user-facing changed-file filtering flag with
      `--touched-since <git-ref>` and carry that name through the scan API while
      preserving existing touched-file filtering semantics.
    status: done
    context: |
      Write the failing CLI/core tests first: `--touched-since` should work where `--diff` worked, and `--diff` should become an unknown flag.
      Keep `scanProject()` deep: callers pass `touchedSinceRef`, and filtering still happens after full detector analysis.
      Do not add a CLI alias or compatibility branch for `--diff`.
    acceptance:
      - CLI usage includes `--touched-since <git-ref>` and omits `--diff <git-ref>`.
      - CLI rejects `--diff` as an unknown flag.
      - `--touched-since` produces the same changed-file-filtered findings as the old `--diff` behavior.
      - `scanProject({ touchedSinceRef })` filters selected cross-project findings after full analysis.
      - `--touched-since` and `--new-since` cannot be combined.
      - Relevant CLI/core tests and `bun run typecheck` pass.
    depends_on: []

  - id: document-scope-vocabulary
    description: >
      Update user-facing docs, release notes, backlog, and agent guidance so the
      scan scope modes use the new touched/new/worsened/regressed vocabulary.
    status: done
    context: |
      README should present current modes as separate review questions: touched files and new candidate identities.
      Mention worsened existing candidates and future union only as future scope modes, not shipped flags.
      Remove the completed BACKLOG item instead of leaving duplicate stale work.
    acceptance:
      - README usage/defaults and SARIF examples use `--touched-since` instead of `--diff`.
      - README presents scan scope modes as mutually exclusive review questions and keeps `--new-since` distinct from touched-file filtering.
      - CHANGELOG records the flag rename for the unreleased release.
      - BACKLOG removes the completed `--diff` to `--touched-since` item while preserving future `--worsened-since` and `--regressed-since` items.
      - AGENTS.md references `--touched-since` when describing post-analysis filtering.
      - `bun run format:check` passes.
    depends_on:
      - rename-touched-scope

  - id: verify-touched-since-scope
    description: >
      Run the integrated verification gate and review the rename for avoidable
      compatibility branches or scan-scope abstraction creep.
    status: done
    context: |
      This is a rename of an existing behavior, not a place to implement worsened/regressed scope modes.
      Complexity review should check that the CLI remains thin and no generic scope object was introduced prematurely.
    acceptance:
      - `bun run format:check` passes.
      - `bun run lint` passes.
      - `bun run typecheck` passes.
      - `bun run test` passes.
      - `bun run test:coverage` passes.
      - `bun run package:check` passes.
      - `bun run scan:ci` passes.
      - Manual complexity review finds no `--diff` alias path and no speculative generic scan-scope machinery.
    depends_on:
      - document-scope-vocabulary

