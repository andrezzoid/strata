goal: >
  Add a `forcedRareOption` detector for exported APIs whose callers mostly pass
  placeholder, default-like, or rarely varied parameters/options that should be
  hidden behind the abstraction.

context: |
  Design A: a cross-project detector indexes exported callable APIs and resolves
  direct project call sites through existing import scope logic. Design B: extend
  wideSignature with local call heuristics. Choose A because the smell is caller
  pressure, so the detector needs project call-site evidence without widening
  single-file detector responsibilities.
  Keep the signal conservative: exported declarations/classes only, direct local
  names only, and 80% agreement across at least three calls.

refs:
  - src/detectors/registry.ts
  - src/detectors/wide-signature.ts
  - src/scope.ts
  - test/detectors.test.ts
  - test/fixtures.test.ts
  - README.md
  - CHANGELOG.md

acceptance:
  - "`forcedRareOption` flags exported functions or constructors when common callers repeatedly pass the same literal, `undefined`, `null`, empty object, or default-like option value."
  - "Placeholder argument call sites such as `fn(a, undefined, undefined, true)` are reported."
  - "Documentation and detector listings describe the detector and its intended overexposure scope."

tasks:
  - id: add-forced-rare-option-detector
    description: >
      Add `forcedRareOption` as a cross-project detector with tests, fixture
      coverage, registry wiring, and user-facing documentation.
    status: done
    context: |
      Reuse existing parser contexts, import-scope resolution, finding creation,
      and fixture conventions. The detector should report the exported API once
      per repeated forced argument/option, with call-site evidence in metadata.
      Do not make scanProject callers orchestrate collection or analysis steps.
    acceptance:
      - "Unit tests cover repeated literal/default-like params, options-object keys, placeholder arguments, and constructor cases."
      - "Fixture scan for `forcedRareOption` emits the expected line-anchored findings."
      - "Registry, README, detector docs, and changelog expose the new detector without changing existing detector semantics."
      - "Relevant Bun tests, format, lint, typecheck, and self-scan verification pass or any residual findings are recorded."
    depends_on: []

