goal: >
  Explore how strata should be packaged and published so users can install and
  run it without cloning, installing, and linking the repository manually.

acceptance:
  - Bun users can install the scoped package globally and run the `strata` command without cloning or linking this repository.
  - The published package has release-appropriate metadata and excludes `.deltas/`, tests, fixtures, and agent-only files.
  - README, CHANGELOG, and BACKLOG describe the Bun/npm install path, Bun runtime requirement, and deferred binary/mise/Homebrew roadmap.
  - Local packed-install verification proves the packaged CLI can run `--help` and scan a fixture before registry publishing.
  - GitHub Release binaries, mise, and Homebrew remain explicitly deferred until the standalone binary native-binding strategy is proven.

context: |
  Current friction: users must clone the repo, install dependencies, and link the package before running `strata`.
  The CLI is Bun-native today: package bin points at `./bin/strata.js`, which uses `#!/usr/bin/env bun` and delegates to `src/cli.ts`.
  The unscoped npm package name `strata` is already taken by an unrelated HTTP server package; `@andrezzoid/strata` appears available.
  Recommended sequence: scoped npm package for Bun users first, GitHub Release binaries second, mise via GitHub releases third, Homebrew tap fourth.
  Standalone binaries need extra design work: a throwaway `bun build --compile` binary crashed because `oxc-parser` loads a native optional binding dynamically.
  Homebrew core is premature; a personal tap is realistic only after release assets and checksums are stable.
  Plan scopes this delta to the Bun/npm source package; binary channels stay followups until native-binding packaging is proven.

refs:
  - package.json
  - README.md
  - CHANGELOG.md
  - BACKLOG.md
  - src/cli.ts
  - bin/strata.js
  - test/cli.test.ts
  - test/fixtures/pass-through-method
  - https://bun.com/docs/pm/cli/publish
  - https://bun.com/docs/pm/cli/install
  - https://bun.com/docs/bundler/executables
  - https://mise.jdx.dev/dev-tools/backends/github.html
  - https://mise.jdx.dev/registry.html
  - https://docs.brew.sh/Formula-Cookbook
  - https://docs.brew.sh/Acceptable-Formulae

open_questions: []

followups:
  - Create a follow-up binary-distribution delta after the scoped Bun/npm package ships.
  - For binaries, evaluate packaging the platform `.node` binding, switching to the OXC WASM binding, or replacing the parser dependency.
  - Add mise install docs and a Homebrew tap only after GitHub Release assets and checksums exist.

notes:
  - >
    `bun publish --dry-run` currently packs `.deltas/`, tests, fixtures, and agent guidance; a release task should add a package `files` allowlist before publishing.
  - >
    `package.json` lacks release-facing metadata such as `description`, `repository`, `homepage`, `license`, and probably `engines.bun`.
  - >
    mise's preferred path for new tools is the `github` backend, not `npm`, because npm tools depend on a runtime/toolchain on PATH.
  - >
    Homebrew core rejects or discourages binary-only and niche/self-submitted formulae; start with a personal tap after GitHub release assets exist.

tasks:
  - id: settle-release-gates
    description: >
      Confirm the public release gates before editing release metadata: package
      identity, license, and publishing access.
    status: done
    context: |
      `strata` is taken on npm, while `@andrezzoid/strata` appears available.
      Keep the installed command name `strata` even if the package is scoped.
      License choice is a project/legal decision; do not invent it during Apply.
    acceptance:
      - The npm package identity is confirmed, with `@andrezzoid/strata` as the recommended default.
      - The license choice is confirmed so package metadata and a LICENSE file can be made truthful.
      - The npm publishing owner/token/OTP path is known, or publishing is explicitly marked blocked by missing access.
    depends_on: []

  - id: prepare-scoped-npm-package
    description: >
      Update package metadata and package contents for a scoped Bun-native npm
      release.
    status: done
    context: |
      Preserve the deep CLI contract: package install exposes `strata`, and `strata` delegates to the existing source CLI.
      Add a `files` allowlist; do not ship `.deltas/`, tests, fixtures, AGENTS.md, or other development-only material.
      Prefer release metadata over new release machinery unless verification proves automation is needed.
    acceptance:
      - "`package.json` has the confirmed package name, release metadata, `publishConfig.access`, `engines.bun`, and a runtime-focused `files` allowlist."
      - "The `bin.strata` entry still points at the Bun CLI entrypoint and the entrypoint keeps its Bun shebang."
      - "`bun publish --dry-run` lists only expected release files and excludes `.deltas/`, tests, fixtures, and agent-only files."
      - "`bun run typecheck` and `bun run test` pass."
    depends_on:
      - settle-release-gates

  - id: document-source-install-roadmap
    description: >
      Update user-facing docs and release notes for the scoped Bun/npm install
      path and the deliberately deferred binary channels.
    status: done
    context: |
      README should be honest that this first channel requires Bun on PATH.
      CHANGELOG records what changed for the release surface.
      BACKLOG is the right home for GitHub Release binaries, mise, and Homebrew until binary packaging is proven.
    acceptance:
      - README install instructions use the confirmed scoped package and mention the Bun runtime requirement.
      - CHANGELOG records the scoped package publishing/install surface for 0.1.0.
      - BACKLOG captures GitHub Release binaries, mise GitHub backend docs, and Homebrew tap as deferred work depending on binary release assets.
    depends_on:
      - prepare-scoped-npm-package

  - id: verify-packed-install
    description: >
      Prove the package works without clone/link by packing it and installing the
      tarball through Bun in an isolated temporary environment.
    status: done
    context: |
      This is the release smoke test before touching the public registry.
      Use temp paths outside the repo so verification does not depend on workspace symlinks or the user's global Bun install state.
      Smoke test `strata --help` and a fixture scan through the installed command.
    acceptance:
      - A packed tarball installs globally through Bun from a temp location without `bun link` or repository-relative execution.
      - The installed `strata` command runs `--help` successfully.
      - The installed `strata` command scans `test/fixtures/pass-through-method --format text` and emits the expected pass-through findings.
      - Verification commands and results are recorded in the delta log during Apply.
    depends_on:
      - document-source-install-roadmap

  - id: publish-scoped-npm-release
    description: >
      Publish the scoped package to the npm registry and verify that a fresh
      registry install exposes the working `strata` command.
    status: blocked
    context: |
      Requires npm publishing access and may require interactive OTP; mark blocked if access is unavailable.
      Do not publish under unscoped `strata`, which is already occupied by another package.
      Publish only after local packed-install verification passes.
    acceptance:
      - "`bun publish --access public` publishes the scoped package version, or the task is blocked with the exact missing-access reason."
      - A fresh global install from the registry exposes `strata` on PATH.
      - The registry-installed `strata` runs `--help` and scans a fixture successfully.
      - README install instructions match the package that was actually published.
    depends_on:
      - verify-packed-install
      - add-package-bin-launcher

  - id: add-package-bin-launcher
    description: >
      Add an npm-conventional executable launcher so package managers preserve
      the installed `strata` command while the implementation stays Bun-native.
    status: done
    context: |
      npm tooling warns when the package bin points directly at `src/cli.ts` and also rejects an extensionless launcher in this package.
      Keep `src/cli.ts` as the real implementation and make `bin/strata.js` a tiny Bun shebang launcher.
      The source CLI must export `main()` so direct CLI execution and package-bin execution share behavior.
    acceptance:
      - "`package.json` maps `bin.strata` to `./bin/strata.js` and includes `bin` in the published files."
      - "`bin/strata.js` has a Bun shebang and delegates to the exported `main()` from `src/cli.ts`."
      - "CLI tests cover the packaged bin launcher."
      - "`npm pack --dry-run` includes the launcher and preserves the package `bin` entry."
      - "Packed global install still exposes a working `strata` command."
    depends_on:
      - verify-packed-install

