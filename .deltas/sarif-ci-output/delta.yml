goal: >
  Make 0.1.1 a CI-focused release by adding GitHub-code-scanning-friendly SARIF
  output to `strata`, while preserving the existing JSON/text CLI behavior and
  candidate-not-verdict contract.

acceptance:
  - CLI accepts `--format sarif` alongside existing `json` and `text` formats.
  - SARIF output is valid SARIF 2.1.0 shape for GitHub code scanning: `$schema`, `version`, one run, `tool.driver`, rule descriptors, results, source locations, and stable partial fingerprints.
  - SARIF results preserve deterministic scanner ordering and use repository-relative file URIs.
  - Default JSON/text output, `--diff`, and `--fail-on-findings` behavior remain unchanged.
  - README and CHANGELOG position 0.1.1 as a CI-focused release with SARIF/code-scanning usage.
  - `bun run format:check`, `bun run lint`, `bun run typecheck`, `bun run test`, `bun run test:coverage`, `bun run package:check`, and `bun run scan:ci` pass.

context: |
  Current formatting is centralized in `src/format.ts`; CLI only parses `--format json|text` and delegates to `formatResult()`.
  GitHub SARIF support expects SARIF 2.1.0 with explicit schema/version, `tool.driver.name`, `tool.driver.rules[]`, result messages, at least one location, and stable `partialFingerprints` for alert identity.
  Design A considered: extend `formatResult()` inline with SARIF construction. It keeps one formatter file but would mix the compact native output with SARIF schema knowledge.
  Design B chosen: add a dedicated `src/sarif.ts` module owned by SARIF schema mapping, with `formatResult()` remaining the small format router. This hides SARIF details from the CLI and scan core.
  SARIF levels should stay non-punitive: use `warning` for code-scanning visibility while keeping `severity: candidate` in native JSON.

refs:
  - src/cli.ts
  - src/format.ts
  - src/types.ts
  - test/core.test.ts
  - test/cli.test.ts
  - README.md
  - CHANGELOG.md
  - .github/workflows/ci.yml
  - https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/sarif-support-for-code-scanning
  - https://docs.oasis-open.org/sarif/sarif/v2.1.0/sarif-v2.1.0.html

open_questions: []

followups:
  - Consider uploading SARIF from GitHub Actions after deciding whether repository code-scanning permissions should be enabled by default.
  - Consider richer SARIF related locations for multi-location findings such as duplicate symbols after the first code-scanning path ships.

tasks:
  - id: add-sarif-formatter
    description: >
      Add a dedicated SARIF formatter module and unit coverage for the SARIF 2.1.0
      shape generated from existing scan results.
    status: done
    context: |
      Keep SARIF schema knowledge in one module; callers should still ask `formatResult(result, format)`.
      Use GitHub-friendly relative artifact URIs and stable fingerprints based on deterministic finding identity.
      Do not change the native `ScanResult` JSON schema.
    acceptance:
      - `formatResult(result, "sarif")` returns SARIF 2.1.0 JSON with schema, version, driver, rules, results, source locations, and partial fingerprints.
      - SARIF results preserve the scanner's existing finding order.
      - Existing `json` and `text` formatter tests still pass unchanged in behavior.
    depends_on: []

  - id: expose-sarif-cli
    description: >
      Wire SARIF into the CLI surface and package scripts so CI jobs can generate
      a SARIF log without custom code.
    status: done
    context: |
      Extend `--format` validation and usage text only; do not add an output-file flag in this first version.
      CI users can redirect stdout to a `.sarif` file or pipe it to an upload step.
      Preserve `--fail-on-findings` so SARIF output can still be used as a blocking gate when desired.
    acceptance:
      - CLI accepts `--format sarif` and rejects other unknown formats.
      - A package script exists for source SARIF generation.
      - CLI tests prove SARIF output parses and `--fail-on-findings` still exits non-zero after writing SARIF.
    depends_on:
      - add-sarif-formatter

  - id: document-ci-focused-release
    description: >
      Update release-facing docs and version metadata so 0.1.1 is positioned as
      the CI/SARIF release.
    status: done
    context: |
      README should show a practical GitHub Actions/code-scanning command path without forcing this repo to upload SARIF by default.
      CHANGELOG should summarize all CI-centered 0.1.1 work: CI gate, hooks, coverage, SARIF, and tsconfig aliases.
      Leave package metadata at the currently published version; bump it only during the publish flow.
    acceptance:
      - README documents `--format sarif`, a CI redirection/upload example, and how it relates to `--fail-on-findings`.
      - CHANGELOG presents 0.1.1 as an unreleased CI-focused version including SARIF and prior CI improvements.
      - `package.json` version remains at the currently published version until publish time.
    depends_on:
      - expose-sarif-cli

  - id: verify-sarif-ci-release
    description: >
      Run the full local gate and review the SARIF boundary for complexity before
      declaring the delta complete.
    status: done
    acceptance:
      - `bun run format:check` passes.
      - `bun run lint` passes.
      - `bun run typecheck` passes.
      - `bun run test` passes.
      - `bun run test:coverage` passes.
      - `bun run package:check` passes.
      - `bun run scan:ci` passes.
      - Complexity review finds no SARIF schema leakage into scan core or CLI orchestration.
    depends_on:
      - document-ci-focused-release

