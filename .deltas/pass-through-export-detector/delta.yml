goal: >
  Add a `passThroughExport` detector for exported callable wrappers that only
  forward same-order arguments to an imported or top-level collaborator, while
  leaving plain barrel re-exports out of the signal.

context: |
  This is the explicit follow-up deferred by the completed `passThroughMethod`
  realignment: class methods stay scoped there, exported free-function wrappers
  get their own flag. Keep the default conservative: only callable local exports
  with one forwarding statement count; `export { X } from "..."` barrels are
  export declarations, not wrappers. Follow the existing single-detector path so
  CLI filtering, JSON, text, and SARIF all use the registry catalog.

refs:
  - src/detectors/pass-through-method.ts
  - src/detectors/wide-signature.ts
  - src/detectors/registry.ts
  - src/format.ts
  - src/sarif.ts
  - test/detectors.test.ts
  - test/fixtures/
  - docs/detectors/pass-through-method.md
  - README.md
  - CHANGELOG.md

acceptance:
  - "`passThroughExport` flags exported function declarations that only return or await a same-order call to another callable."
  - "`passThroughExport` does not flag non-exported helpers, transformed or reordered arguments, unrelated callee names, or plain barrel re-exports."
  - The detector is selectable through the public detector registry and appears correctly in JSON/text/SARIF output.
  - Detector behavior and release surface are documented.

open_questions: []

tasks:
  - id: add-export-wrapper-detector
    description: >
      Add the focused `passThroughExport` detector, registry integration, and
      tests for callable exported wrappers versus non-wrappers.
    status: done
    context: |
      Prefer a separate detector over expanding `passThroughMethod`; the flags
      represent different public surfaces. Reuse the same conservative wrapper
      shape: simple identifier params, exact same-order forwarded args, direct
      call or `return await`, and name equality/stemming. Barrel re-exports have
      no local function body and should be naturally ignored.
    acceptance:
      - Unit tests cover a flagged exported wrapper and plain barrel re-exports as a negative case.
      - Negative tests cover non-exported helpers, transformed/reordered args, and unrelated callee names.
      - Fixture coverage records expected `passThroughExport` findings.
      - Registry, text evidence, and SARIF rule metadata know the new detector id.
    depends_on: []

  - id: document-export-wrapper-detector
    description: >
      Document the new detector's scope and public detector table/release notes.
    status: done
    context: |
      Keep the docs clear that callable wrappers are the target, not API-curation
      barrels. Update public docs where users discover detector ids and release
      behavior.
    acceptance:
      - A detector doc explains what is flagged, why it matters, how detection works, and acceptable cases.
      - README detector table includes `passThroughExport` with the correct scope and signal.
      - CHANGELOG records the new unreleased detector.
    depends_on:
      - add-export-wrapper-detector

