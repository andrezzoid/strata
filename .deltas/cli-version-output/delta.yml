goal: >
  Explore and define the right CLI version surface so users can tell which
  installed strata version they are running.

acceptance:
  - "`strata --version` exits 0 and prints `strata <package.json version>`."
  - "`strata --help` exits 0 and includes the same version before the usage line."
  - Version behavior works through both `src/cli.ts` and the packaged `bin/strata.js` launcher.
  - Tests cover the version/help behavior without making release metadata brittle.

context: |
  User preference: likely add dedicated `--version` and include version in `--help`.
  Current CLI help is a two-line `printUsage()` string in `src/cli.ts`; unknown flags, including `--version`, exit through the generic error path.
  Package metadata already exposes version `0.2.0`; `bin/strata.js` delegates to the same exported `main()` as direct source execution.
  Surveyed git, node, npm, bun, gh, ripgrep, tsc, oxlint, and oxfmt: every one supports `--version`, but short aliases vary between `-v`, `-V`, and none.
  Help output convention is mixed: bun, ripgrep, tsc, and npm surface the current version in help; git, gh, node, oxlint, and oxfmt only advertise the version flag.
  Recommended first design: add long-form `--version`, print `strata <version>`, include `strata <version>` at the top of help, and skip short aliases for now.
  Plan shape: one vertical task keeps the CLI thin and avoids a docs-only intermediate state that describes behavior before it exists.

refs:
  - src/cli.ts
  - bin/strata.js
  - package.json
  - test/cli.test.ts
  - README.md

open_questions: []

followups:
  - Revisit a short version alias only if users ask for one; `-v` and `-V` conventions conflict and `-v` may be useful for future verbose output.

notes:
  - "Observed `--version` output styles: git and gh use named output with extra context, node/npm/bun use bare versions, ripgrep includes feature details, tsc/ox tools use `Version` labels."
  - "A `version` subcommand is not necessary for strata's current flat CLI; npm has one because package version management is itself a command domain."

tasks:
  - id: add-cli-version-output
    description: >
      Add the user-visible version surface to the CLI: write failing CLI tests,
      load the package version from package metadata, handle `--version`, include
      the same version line in help, and document the new behavior.
    status: done
    context: |
      Keep `src/cli.ts` as the thin process adapter: argument parsing, usage/version output, scan invocation, and exit behavior.
      Prefer reading the package version from package metadata over duplicating a hard-coded constant; avoid changing `tsconfig` just to import JSON unless implementation proves it is the smallest clean path.
      Do not add `-v`, `-V`, or a `version` subcommand in this first slice.
      Update README/CHANGELOG because this is user-facing CLI behavior.
    acceptance:
      - "A new test fails before implementation for `strata --version`, expecting exit 0, stdout `strata <package.json version>`, and empty stderr."
      - "A new or updated help test proves `strata --help` exits 0 and starts with `strata <package.json version>` before the usage line."
      - "A packaged-bin test proves `bun bin/strata.js --version` uses the same behavior as direct source execution."
      - "No short alias or `version` subcommand is documented or accepted."
      - README usage documents `strata --version`, and CHANGELOG records the new CLI version output.
      - "`bun test test/cli.test.ts` and `bun run typecheck` pass."
    depends_on: []

